<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Chat</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00D4AA">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0A0A0F;
      --bg-secondary: #12121A;
      --bg-tertiary: #1A1A24;
      --accent-primary: #00D4AA;
      --accent-secondary: #00B4D8;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0B0;
      --text-tertiary: #6A6A80;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Header */
    .header {
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(12px);
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0, 212, 170, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .logo-text {
      font-weight: 700;
      font-size: 18px;
    }
    
    .status-badge {
      background: var(--bg-tertiary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10B981;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
    }
    
    .message.user {
      align-self: flex-end;
      background: var(--accent-primary);
      color: var(--bg-primary);
      border-bottom-right-radius: 4px;
    }
    
    .message.assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      border: 1px solid rgba(0, 212, 170, 0.2);
      border-bottom-left-radius: 4px;
    }
    
    .message-time {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    
    .message.user .message-time {
      color: rgba(0, 0, 0, 0.5);
    }
    
    /* Input Area */
    .input-area {
      background: var(--bg-secondary);
      padding: 16px 20px;
      border-top: 1px solid rgba(0, 212, 170, 0.1);
    }
    
    .input-container {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    
    .input-wrapper {
      flex: 1;
      background: var(--bg-tertiary);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
    }
    
    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }
    
    input[type="text"]::placeholder {
      color: var(--text-tertiary);
    }
    
    .send-btn {
      background: var(--accent-primary);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.4);
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Navigation */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0, 212, 170, 0.1);
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      color: var(--text-tertiary);
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }
    
    .nav-item.active {
      color: var(--accent-primary);
    }
    
    .nav-item:hover {
      color: var(--accent-secondary);
    }
    
    .nav-icon {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <span class="logo-text">JARVIS</span>
    </div>
    <div class="status-badge">
      <span class="status-dot"></span>
      <span>Online</span>
    </div>
  </header>

  <!-- Chat Area -->
  <main class="chat-area" id="chatArea">
    <div class="message assistant">
      🤖 안녕하세요! JARVIS입니다.
      <div class="message-time">00:00</div>
    </div>
  </main>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-container">
      <div class="input-wrapper">
        <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." autocomplete="off">
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="#0A0A0F"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <a href="chat.html" class="nav-item active">
      <span class="nav-icon">💬</span>
      <span>Chat</span>
    </a>
    <a href="terminal.html" class="nav-item">
      <span class="nav-icon">💻</span>
      <span>Terminal</span>
    </a>
    <a href="dashboard.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span>Dashboard</span>
    </a>
  </nav>

  <script>
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    
    // Enter key to send
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    function sendMessage() {
      const text = messageInput.trim();
      if (!text) return;
      
      // Add user message
      addMessage('user', text);
      messageInput.value = '';
      
      // Show typing indicator
      showTyping();
      
      // Simulate response (replace with actual API call)
      setTimeout(() => {
        hideTyping();
        addMessage('assistant', '메시지를 받았습니다. 실제 API와 연결되면 답변 드리겠습니다.');
      }, 1500);
    }
    
    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `${text}<div class="message-time">${time}</div>`;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant typing';
      div.id = 'typingIndicator';
      div.innerHTML = 'typing...<div class="message-time">...</div>';
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    function hideTyping() {
      document.getElementById('typingIndicator')?.remove();
    }
  </script>
</body>
</html>
