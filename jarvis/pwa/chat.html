<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS :: CHAT</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#33ff00">
  <link rel="stylesheet" href="terminal-base.css">
  <style>
    /* Page-specific styles */
    html, body {
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      padding: var(--space-md);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .logo-icon {
      color: var(--primary);
      text-shadow: var(--glow-text);
    }

    .logo-text {
      font-size: var(--font-size-lg);
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--primary);
      text-shadow: var(--glow-text);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      padding: var(--space-xs) var(--space-sm);
      border: 1px solid var(--border);
    }

    .status-badge:hover {
      border-color: var(--primary);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--error);
    }

    .status-dot.connected {
      background: var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
      animation: pulse 2s infinite;
    }

    .status-text {
      color: var(--text-muted);
    }

    .status-text.online {
      color: var(--primary);
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-md);
      padding-bottom: 140px;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    /* Messages */
    .message {
      max-width: 85%;
      padding: var(--space-md);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      position: relative;
    }

    .message::before {
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: var(--space-xs);
    }

    .message.user {
      align-self: flex-end;
      border-color: var(--secondary);
      border-left: 3px solid var(--secondary);
    }

    .message.user::before {
      content: '> USER';
      color: var(--secondary);
    }

    .message.assistant {
      align-self: flex-start;
      border-color: var(--primary-dim);
      border-left: 3px solid var(--primary);
    }

    .message.assistant::before {
      content: '> JARVIS';
      color: var(--primary);
    }

    .message.error {
      border-color: var(--error-dim);
      border-left: 3px solid var(--error);
    }

    .message.error::before {
      content: '> ERROR';
      color: var(--error);
    }

    .message-time {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
      margin-top: var(--space-xs);
      text-align: right;
    }

    .message-content {
      color: var(--text-bright);
    }

    .message code {
      background: var(--bg-elevated);
      padding: 2px 6px;
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      color: var(--secondary);
    }

    .message pre {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      padding: var(--space-md);
      overflow-x: auto;
      margin: var(--space-sm) 0;
    }

    .message pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text-primary);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: var(--space-xs);
      padding: var(--space-sm);
    }

    .typing span {
      width: 8px;
      height: 2px;
      background: var(--primary);
      animation: typing-blink 1s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-blink {
      0%, 60%, 100% { opacity: 1; }
      30% { opacity: 0.3; }
    }

    /* Input Area */
    .input-area {
      position: fixed;
      bottom: 50px;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      padding: var(--space-md);
      border-top: 1px solid var(--border);
    }

    .input-container {
      display: flex;
      gap: var(--space-sm);
      align-items: center;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      padding: var(--space-sm) var(--space-md);
    }

    .input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 5px var(--primary-glow);
    }

    .input-prompt {
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      margin-right: var(--space-sm);
      white-space: nowrap;
    }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-bright);
      font-family: var(--font-mono);
      font-size: var(--font-size-base);
      outline: none;
      caret-color: var(--primary);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: var(--font-size-lg);
      transition: var(--transition-fast);
    }

    .send-btn:hover:not(:disabled) {
      background: var(--primary);
      color: var(--bg-primary);
      box-shadow: var(--glow-primary);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      border-color: var(--border);
      color: var(--text-muted);
    }

    /* Navigation */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: var(--space-sm) 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: var(--space-xs) var(--space-md);
      color: var(--text-muted);
      text-decoration: none;
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: var(--transition-fast);
      border: 1px solid transparent;
    }

    .nav-item:hover {
      color: var(--text-secondary);
      border-color: var(--border);
    }

    .nav-item.active {
      color: var(--primary);
      border-color: var(--primary);
      text-shadow: var(--glow-text);
    }

    .nav-icon {
      font-size: var(--font-size-lg);
    }

    /* Login Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--bg-secondary);
      padding: var(--space-lg);
      border: 1px solid var(--border);
      width: 90%;
      max-width: 360px;
    }

    .modal-header {
      text-align: center;
      margin-bottom: var(--space-lg);
    }

    .modal-header h2 {
      font-size: var(--font-size-lg);
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--primary);
      text-shadow: var(--glow-text);
      margin-bottom: var(--space-xs);
    }

    .modal-header p {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal-content .input-group {
      margin-bottom: var(--space-md);
    }

    .modal-content .input-label {
      display: block;
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: var(--space-xs);
    }

    .modal-content input[type="password"] {
      width: 100%;
      padding: var(--space-sm) var(--space-md);
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-bright);
      font-family: var(--font-mono);
      font-size: var(--font-size-base);
      outline: none;
    }

    .modal-content input[type="password"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 5px var(--primary-glow);
    }

    .modal-content .login-btn {
      width: 100%;
      padding: var(--space-md);
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: var(--transition-fast);
    }

    .modal-content .login-btn::before { content: '[ '; }
    .modal-content .login-btn::after { content: ' ]'; }

    .modal-content .login-btn:hover {
      background: var(--primary);
      color: var(--bg-primary);
      box-shadow: var(--glow-primary);
    }

    .modal-content .error-text {
      color: var(--error);
      font-size: var(--font-size-xs);
      margin-bottom: var(--space-md);
      padding: var(--space-sm);
      border: 1px solid var(--error-dim);
      background: rgba(255, 51, 51, 0.1);
      display: none;
    }

    .modal-content .error-text.show {
      display: block;
    }

    /* ASCII decoration */
    .ascii-box {
      border: 1px dashed var(--border);
      padding: var(--space-xs);
      margin-bottom: var(--space-md);
      text-align: center;
      font-size: var(--font-size-xs);
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <!-- Login Modal -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>JARVIS</h2>
        <p>Authentication Required</p>
      </div>
      <div class="ascii-box">+---[ SECURE LOGIN ]---+</div>
      <div class="error-text" id="loginError"></div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" id="passwordInput" placeholder="Enter access token..." autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="login()">Authenticate</button>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">[J]</span>
      <span class="logo-text">JARVIS</span>
    </div>
    <div class="status-badge" onclick="reconnect()">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">CONNECTING...</span>
    </div>
  </header>

  <!-- Chat Area -->
  <main class="chat-area" id="chatArea">
    <div class="message assistant">
      System initialized. JARVIS v2.0 ready.
      <br>Type your query below.
      <div class="message-time">--:--</div>
    </div>
  </main>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-container">
      <div class="input-wrapper">
        <span class="input-prompt">user@jarvis:~$</span>
        <input type="text" id="messageInput" placeholder="Enter command..." autocomplete="off">
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        >
      </button>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <a href="chat.html" class="nav-item active">
      <span class="nav-icon">[C]</span>
      <span>Chat</span>
    </a>
    <a href="terminal.html" class="nav-item">
      <span class="nav-icon">[T]</span>
      <span>Term</span>
    </a>
    <a href="dashboard.html" class="nav-item">
      <span class="nav-icon">[D]</span>
      <span>Dash</span>
    </a>
  </nav>

  <!-- API Client -->
  <script src="/js/api-client.js"></script>

  <script>
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const loginModal = document.getElementById('loginModal');
    const passwordInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');

    let isTyping = false;
    let useWebSocket = true;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initializeApp();
    });

    async function initializeApp() {
      // Check if already authenticated
      if (!JarvisAPI.isAuthenticated()) {
        // Try without auth first (in case server has no password)
        try {
          const health = await JarvisAPI.health();
          if (health.status === 'ok') {
            enableChat();
            connectWebSocket();
            return;
          }
        } catch (e) {
          // Need authentication
        }
        showLoginModal();
      } else {
        enableChat();
        connectWebSocket();
      }
    }

    function showLoginModal() {
      loginModal.classList.add('show');
      passwordInput.focus();
    }

    function hideLoginModal() {
      loginModal.classList.remove('show');
      loginError.textContent = '';
      loginError.classList.remove('show');
    }

    async function login() {
      const password = passwordInput.value;

      if (!password) {
        loginError.textContent = '> ERROR: Password required';
        loginError.classList.add('show');
        return;
      }

      const result = await JarvisAPI.authenticate(password);

      if (result.success) {
        hideLoginModal();
        enableChat();
        connectWebSocket();
        addMessage('assistant', 'Authentication successful. Access granted.');
      } else {
        loginError.textContent = '> ERROR: ' + (result.error || 'Authentication failed');
        loginError.classList.add('show');
      }
    }

    // Enter key for login
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    function enableChat() {
      sendBtn.disabled = false;
      messageInput.disabled = false;
    }

    function connectWebSocket() {
      JarvisAPI.connectWebSocket(
        // On message
        (data) => {
          if (data.type === 'chat' && data.response) {
            hideTyping();
            addMessage('assistant', data.response);
          }
        },
        // On status change
        (status) => {
          updateConnectionStatus(status === 'connected');
        }
      );
    }

    function reconnect() {
      JarvisAPI.disconnectWebSocket();
      updateConnectionStatus(false);
      setTimeout(() => {
        connectWebSocket();
      }, 500);
    }

    function updateConnectionStatus(connected) {
      if (connected) {
        statusDot.classList.add('connected');
        statusText.classList.add('online');
        statusText.textContent = 'ONLINE';
      } else {
        statusDot.classList.remove('connected');
        statusText.classList.remove('online');
        statusText.textContent = 'OFFLINE';
      }
    }

    // Enter key to send
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isTyping) return;

      // Add user message
      addMessage('user', text);
      messageInput.value = '';

      // Show typing indicator
      showTyping();
      isTyping = true;

      try {
        // Try WebSocket first if connected
        if (useWebSocket && JarvisAPI.isConnected()) {
          JarvisAPI.wsChat(text);
          // Response will come via WebSocket message handler
        } else {
          // Fallback to REST API
          const response = await JarvisAPI.chat(text);
          hideTyping();
          isTyping = false;

          if (response.error) {
            addMessage('error', response.error);
          } else {
            addMessage('assistant', response.response || 'No response');
          }
        }
      } catch (error) {
        hideTyping();
        isTyping = false;
        addMessage('error', error.message);
      }
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

      // Simple markdown rendering
      let formattedText = escapeHtml(text);
      formattedText = formattedText.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      formattedText = formattedText.replace(/`([^`]+)`/g, '<code>$1</code>');
      formattedText = formattedText.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      formattedText = formattedText.replace(/\n/g, '<br>');

      div.innerHTML = `<span class="message-content">${formattedText}</span><div class="message-time">${time}</div>`;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message assistant typing-indicator';
      div.id = 'typingIndicator';
      div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.remove();
      }
      isTyping = false;
    }

    // Handle WebSocket chat responses
    JarvisAPI.on('chat', (response) => {
      hideTyping();
      addMessage('assistant', response);
    });
  </script>
</body>
</html>
